server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Match the security headers used on Cloudflare Pages (_headers)
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  # Hashed Vite build assets — cache forever
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  # Hero image, etc. — short cache
  location = /hero-jewelry.jpg {
    expires 1d;
    add_header Cache-Control "public, max-age=86400" always;
  }

  # SPA fallback: any unknown path serves index.html
  location / {
    add_header Cache-Control "public, must-revalidate, max-age=0" always;
    try_files $uri $uri/ /index.html;
  }
}
