# Builds the Vite app in client/ and deploys static output to GitHub Pages.
# In the repo: Settings → Pages → Source: GitHub Actions.
#
# The site URL is https://<owner>.github.io/<repo>/ (project site).
# If your repo is <owner>.github.io (user/org site), set VITE_BASE=/ in the
# workflow env below instead of /${{ github.event.repository.name }}/

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install and build
        working-directory: client
        run: npm ci && npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
