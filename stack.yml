# Docker Swarm stack — deploy after images exist on every node (or a registry).
#
#   docker swarm init   # once per cluster
#   docker compose -f docker-compose.yml build
#   docker stack deploy -c stack.yml bare-brilliant --env-file .env
#
# Build args for the client image (VITE_*) must be set when building;
# see docker-compose.yml client service. Same env file works for compose build.
#
# Note: Swarm ignores depends_on and container_name. publish mode uses ingress mesh.

services:
  server:
    image: bare-brilliant-api:latest
    ports:
      - target: 5001
        published: ${SERVER_PORT:-5001}
        protocol: tcp
        mode: ingress
    environment:
      PORT: "5001"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      LEADS_FILE: /app/data/leads.jsonl
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
    volumes:
      - server_data:/app/data
    networks:
      - bare-brilliant
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:5001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  client:
    image: bare-brilliant-web:latest
    ports:
      - target: 80
        published: ${CLIENT_PORT:-8080}
        protocol: tcp
        mode: ingress
    networks:
      - bare-brilliant
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  bare-brilliant:
    driver: overlay
    attachable: true

volumes:
  server_data:
